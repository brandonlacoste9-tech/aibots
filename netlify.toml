# aibots is a Python research library. Netlify only hosts the static docs site.
# Runtime (CLI / agent loop) runs locally or on an API host — not on Netlify.

[build]
  publish = "site"
  # No build command: static HTML only. Do not pip-install requirements.txt.
  command = "echo 'static site publish only'"

[build.environment]
  # Prevent Netlify from auto-installing Python deps from requirements.txt
  PYTHON_VERSION = ""
  NETLIFY_SKIP_PYTHON = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
