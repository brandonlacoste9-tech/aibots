# Indie Trader (indie-trader.com) — marketing site for the AI paper trading bot.
# Engine package is aibots (Python). Runtime stays CLI / API host, not Netlify.

[build]
  publish = "site"
  command = "echo 'Indie Trader static site'"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
