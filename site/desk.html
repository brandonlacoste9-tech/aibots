<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Desk — Indie Trader</title>
    <meta
      name="description"
      content="Ask anything about the stock market. Indie Trader AI desk with live tools for prices, indicators, and news."
    />
    <link rel="canonical" href="https://indie-trader.com/desk" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #070b10;
        --panel: #0f1520;
        --line: #243041;
        --text: #eef3fa;
        --muted: #8b9bb0;
        --good: #3dd68c;
        --bad: #f07178;
        --accent: #5b9cff;
        --user: #1a2740;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(15, 21, 32, 0.95);
        flex-wrap: wrap;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--text);
        font-weight: 700;
      }
      .mark {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), var(--good));
        display: grid;
        place-items: center;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        color: #061018;
      }
      .status {
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
      }
      .dot.ok {
        background: var(--good);
        box-shadow: 0 0 10px var(--good);
      }
      .dot.bad {
        background: var(--bad);
      }
      .dot.warn {
        background: #e6c07b;
      }
      .links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.88rem;
        margin-left: 12px;
      }
      .links a:hover {
        color: var(--text);
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        min-height: 0;
      }
      #thread {
        flex: 1;
        overflow-y: auto;
        padding: 20px 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .msg {
        max-width: 92%;
        border-radius: 14px;
        padding: 12px 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--user);
        border: 1px solid var(--line);
      }
      .msg.assistant {
        align-self: flex-start;
        background: var(--panel);
        border: 1px solid var(--line);
      }
      .msg.system {
        align-self: center;
        max-width: 100%;
        background: transparent;
        border: 1px dashed var(--line);
        color: var(--muted);
        font-size: 0.92rem;
      }
      .msg .who {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .tools {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        color: var(--muted);
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 16px 10px;
      }
      .chip {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.82rem;
        cursor: pointer;
      }
      .chip:hover {
        border-color: var(--accent);
      }
      .composer {
        border-top: 1px solid var(--line);
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
        background: rgba(15, 21, 32, 0.98);
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      textarea {
        flex: 1;
        resize: none;
        min-height: 48px;
        max-height: 140px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #0a1018;
        color: var(--text);
        padding: 12px 14px;
        font: inherit;
        line-height: 1.4;
      }
      textarea:focus {
        outline: 2px solid rgba(91, 156, 255, 0.35);
        border-color: var(--accent);
      }
      button.send {
        border: none;
        border-radius: 12px;
        background: var(--accent);
        color: #061018;
        font-weight: 700;
        padding: 12px 16px;
        cursor: pointer;
        min-height: 48px;
      }
      button.send:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .settings {
        display: none;
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        background: #0a1018;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .settings.open {
        display: flex;
      }
      .settings input {
        flex: 1;
        min-width: 200px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        padding: 8px 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
      }
      .settings button {
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        padding: 8px 12px;
        cursor: pointer;
      }
      .gear {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <header class="top">
      <a class="brand" href="/">
        <span class="mark">IT</span>
        Indie Trader Desk
      </a>
      <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap">
        <div class="status" id="status">
          <span class="dot" id="dot"></span>
          <span id="statusText">checking API…</span>
        </div>
        <button type="button" class="gear" id="gearBtn" title="API settings">API</button>
        <div class="links">
          <a href="/">Home</a>
          <a href="https://github.com/brandonlacoste9-tech/aibots">GitHub</a>
        </div>
      </div>
    </header>

    <div class="settings" id="settings">
      <label for="apiUrl" style="color: var(--muted); font-size: 0.85rem">API base URL</label>
      <input id="apiUrl" type="url" placeholder="http://localhost:8080" />
      <button type="button" id="saveApi">Save</button>
    </div>

    <main>
      <div id="thread" aria-live="polite"></div>
      <div class="chips" id="chips"></div>
      <form class="composer" id="form">
        <textarea
          id="input"
          rows="2"
          placeholder="Ask anything about the stock market…"
          maxlength="8000"
        ></textarea>
        <button class="send" type="submit" id="sendBtn">Ask</button>
      </form>
    </main>

    <script>
      const SUGGESTIONS = [
        "What moves stock prices day to day?",
        "Explain RSI and when it is useful",
        "How is NVDA looking on daily technicals?",
        "What is a PE ratio vs PEG?",
        "Bull vs bear case for SPY this month",
        "What should a beginner paper-trade first?",
      ];

      const STORAGE_KEY = "indie_trader_api_base";

      function isLocalHost() {
        const h = location.hostname;
        return h === "localhost" || h === "127.0.0.1" || h === "";
      }

      function defaultApiBase() {
        // Same-origin when desk is served by aibots API (recommended).
        if (isLocalHost() && (location.port === "8080" || location.port === "8000")) {
          return location.origin.replace(/\/$/, "");
        }
        // HTTPS Netlify cannot call http://localhost (browser mixed-content block).
        // Prefer opening http://localhost:8080/desk instead of the Netlify URL.
        return "http://localhost:8080";
      }

      function getApiBase() {
        const q = new URLSearchParams(location.search).get("api");
        if (q) return q.replace(/\/$/, "");
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) return stored.replace(/\/$/, "");
        return defaultApiBase();
      }

      function mixedContentHint() {
        if (location.protocol === "https:" && getApiBase().startsWith("http://")) {
          return (
            "\n\nBrowser block: this page is HTTPS (Netlify) and cannot call an HTTP API. " +
            "Open the desk at http://localhost:8080/desk instead (same origin as the API)."
          );
        }
        return "";
      }

      let history = [];
      const thread = document.getElementById("thread");
      const input = document.getElementById("input");
      const form = document.getElementById("form");
      const sendBtn = document.getElementById("sendBtn");
      const chips = document.getElementById("chips");
      const dot = document.getElementById("dot");
      const statusText = document.getElementById("statusText");
      const settings = document.getElementById("settings");
      const apiUrl = document.getElementById("apiUrl");

      function addMsg(role, text, tools) {
        const el = document.createElement("div");
        el.className = "msg " + role;
        const who = document.createElement("div");
        who.className = "who";
        who.textContent =
          role === "user" ? "You" : role === "assistant" ? "Indie Trader" : "Desk";
        el.appendChild(who);
        const body = document.createElement("div");
        body.textContent = text;
        el.appendChild(body);
        if (tools && tools.length) {
          const t = document.createElement("div");
          t.className = "tools";
          t.textContent =
            "tools: " +
            tools
              .map((c) => c.name + (c.ok === false ? " ✗" : ""))
              .join(", ");
          el.appendChild(t);
        }
        thread.appendChild(el);
        thread.scrollTop = thread.scrollHeight;
      }

      addMsg(
        "system",
        "Ask any stock-market question — concepts, tickers, technicals, news context, risk. For live numbers the desk uses market tools. Paper / educational only — never places live orders."
      );

      SUGGESTIONS.forEach((s) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip";
        b.textContent = s;
        b.onclick = () => {
          input.value = s;
          input.focus();
        };
        chips.appendChild(b);
      });

      async function ping() {
        const base = getApiBase();
        try {
          const r = await fetch(base + "/health", { signal: AbortSignal.timeout(8000) });
          const j = await r.json();
          if (j.ok) {
            dot.className = "dot " + (j.llm_configured ? "ok" : "warn");
            statusText.textContent = j.llm_configured
              ? "API online · Grok ready"
              : "API online · set XAI_API_KEY on server";
            return;
          }
        } catch (e) {
          /* fallthrough */
        }
        dot.className = "dot bad";
        statusText.textContent = "API offline · set URL (API button)";
      }

      document.getElementById("gearBtn").onclick = () => {
        settings.classList.toggle("open");
        apiUrl.value = getApiBase();
      };
      document.getElementById("saveApi").onclick = () => {
        const v = apiUrl.value.trim().replace(/\/$/, "");
        if (v) localStorage.setItem(STORAGE_KEY, v);
        settings.classList.remove("open");
        ping();
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message || sendBtn.disabled) return;
        input.value = "";
        addMsg("user", message);
        sendBtn.disabled = true;
        statusText.textContent = "Thinking…";
        dot.className = "dot warn";

        try {
          const base = getApiBase();
          const r = await fetch(base + "/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              history: history.slice(-20),
              journal: true,
            }),
          });
          const j = await r.json().catch(() => ({}));
          if (!r.ok) {
            throw new Error(j.detail || j.message || r.statusText || "Chat failed");
          }
          addMsg("assistant", j.assistant_text || "(empty)", j.tool_calls || []);
          if (Array.isArray(j.history)) {
            history = j.history.map((m) => ({
              role: m.role,
              content: m.content,
            }));
          } else {
            history.push({ role: "user", content: message });
            history.push({
              role: "assistant",
              content: j.assistant_text || "",
            });
          }
          await ping();
        } catch (err) {
          addMsg(
            "system",
            "Could not reach the desk API: " +
              (err && err.message ? err.message : String(err)) +
              "\n\n1) Start API:  python -m aibots serve --port 8080" +
              "\n2) Open desk:  http://localhost:8080/desk" +
              "\n   (Do not use the HTTPS Netlify URL against localhost — browsers block it.)" +
              mixedContentHint()
          );
          dot.className = "dot bad";
          statusText.textContent = "request failed";
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      ping();
      setInterval(ping, 30000);
    </script>
  </body>
</html>
